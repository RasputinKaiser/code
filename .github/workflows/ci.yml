name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: |
          # Excluded test files:
          # - compiledBinaryPty/wrapperPty/wrapperTmux: require a built native binary (covered by package-smoke)
          # - commit.e2e/commit.integration: require sl (Sapling VCS), not available on CI runners
          # - replToolTranscriptScreenContract/LogoV2.renderSnapshot: snapshot tests with machine-specific paths
          # - permissionOptions: hardcodes /home/xjdr/ as home dir, fails on CI runners
          mapfile -t files < <(find src -name '*.test.*' | grep -vE \
            'compiledBinaryPty|wrapperPty|wrapperTmux|commit\.e2e\.test|commit\.integration\.test|replToolTranscriptScreenContract|LogoV2\.renderSnapshot|permissionOptions\.test' \
            | sort)
          bun tools/test/run-isolated-bun-tests.mjs "${files[@]}"

  package-smoke:
    name: Package smoke / ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-24.04
            target: bun-linux-x64
          - name: darwin-arm64
            runner: macos-14
            target: bun-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-bun-

      - name: Cache Cargo dependencies and native targets
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            native/markdown-renderer-napi/target
            native/openai-compat-ws-v2-napi/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('native/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and smoke-test package
        run: |
          OUT_DIR="$RUNNER_TEMP/ncode-package-smoke"
          bun build/packageSmoke.mjs \
            --build-mode external \
            --target "${{ matrix.target }}" \
            --out-dir "$OUT_DIR" \
            --keep-output
